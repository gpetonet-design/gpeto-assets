<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const GLB_URLS = ["https://gpetonet-design.github.io/gpeto-assets/abstract_metal_sculpture_3d_model.glb", "https://gpetonet-design.github.io/gpeto-assets/spiky_sea_creature_3d_model.glb", "https://gpetonet-design.github.io/gpeto-assets/stylized_shoe_3d_model.glb", "https://gpetonet-design.github.io/gpeto-assets/cactus_flower_sculpture_3d_model.glb", "https://gpetonet-design.github.io/gpeto-assets/coral-like_sculpture_3d_model.glb"];
const VIEWER_IDS = ['v0','v1','v2','v3','v4'];
const COLORS = [0xd0d0d0, 0xc8b89a, 0xa8c4d4, 0xd4c8a8, 0xb8d4c4];
const LINK = "https://gpeto.com.br/Organismo-Sintetico";

function initViewer(containerId, glbUrl, color) {
  const container = document.getElementById(containerId);
  const w = container.offsetWidth;
  const h = container.offsetHeight;

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w/h, 0.01, 1000);
  camera.position.set(0, 0, 3);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const key = new THREE.DirectionalLight(0xffffff, 1.8);
  key.position.set(2, 4, 3); scene.add(key);
  const fill = new THREE.DirectionalLight(0xaaccff, 0.5);
  fill.position.set(-3, 1, -2); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffeedd, 0.4);
  rim.position.set(0, -2, -3); scene.add(rim);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.enableZoom = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.2;

  let resumeTimer;
  controls.addEventListener('start', () => { controls.autoRotate = false; });
  controls.addEventListener('end', () => {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 2500);
  });

  const loader = new GLTFLoader();
  loader.load(
    glbUrl,
    (gltf) => {
      const loaderEl = container.querySelector('.loader');
      if (loaderEl) loaderEl.remove();

      const model = gltf.scene;
      const mat = new THREE.MeshStandardMaterial({ color, metalness:0.25, roughness:0.55 });
      model.traverse(child => { if (child.isMesh) child.material = mat; });

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      model.scale.setScalar(2.0 / Math.max(size.x, size.y, size.z));
      scene.add(model);
    },
    undefined,
    (err) => {
      const loaderEl = container.querySelector('.loader');
      if (loaderEl) loaderEl.textContent = 'erro ao carregar';
      console.error('GLB error:', glbUrl, err);
    }
  );

  let isDragging = false;
  renderer.domElement.addEventListener('pointerdown', () => isDragging = false);
  renderer.domElement.addEventListener('pointermove', () => isDragging = true);
  renderer.domElement.addEventListener('pointerup', () => {
    if (!isDragging) window.location.href = LINK;
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

VIEWER_IDS.forEach((id, i) => initViewer(id, GLB_URLS[i], COLORS[i]));
</script>
</body>
</html>
